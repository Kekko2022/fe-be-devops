trigger:
  - main

pr: none

pool:
  name: self-hosted-pool

variables:
  azureServiceConnection: 'sc-obs-azure-rg'
  resourceGroupName: 'rg-observability-lab12-standalone'
  acrName: 'obsacrc830a3'
  containerAppsEnvironment: 'aca-env-francesco'

  backendAppName: 'be-obs-app'
  frontendAppName: 'fe-obs-app'

  backendImageName: 'backend'
  frontendImageName: 'frontend'

  imageTag: '$(Build.BuildId)'

stages:

# =========================
# VALIDATION
# =========================
- stage: ValidateRepository
  jobs:
  - job: ValidateFiles
    steps:
    - checkout: self
    - bash: |
        set -e
        test -f frontend/app.py
        test -f backend/app.py
        python3 -m py_compile frontend/app.py
        python3 -m py_compile backend/app.py
      displayName: Validate repo

# =========================
# BUILD
# =========================
- stage: PublishImages
  dependsOn: ValidateRepository
  jobs:

  - job: BuildBackend
    steps:
    - checkout: self
    - task: AzureCLI@2
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(acrName)

          $IMAGE = "$(acrName).azurecr.io/$(backendImageName):$(imageTag)"

          docker buildx build `
            --platform linux/amd64 `
            --provenance=false `
            -t $IMAGE `
            --push `
            ./backend

  - job: BuildFrontend
    dependsOn: BuildBackend
    steps:
    - checkout: self
    - task: AzureCLI@2
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(acrName)

          $IMAGE = "$(acrName).azurecr.io/$(frontendImageName):$(imageTag)"

          docker buildx build `
            --platform linux/amd64 `
            --provenance=false `
            -t $IMAGE `
            --push `
            ./frontend

# =========================
# DEPLOY BACKEND
# =========================
- stage: DeployBackend
  dependsOn: PublishImages
  jobs:
  - job: DeployBackendJob
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |

          az extension add --name containerapp --upgrade --yes
          az config set extension.use_dynamic_install=yes_without_prompt

          $IMAGE = "$(acrName).azurecr.io/$(backendImageName):$(imageTag)"

          Write-Host "Checking backend existence..."
          $exists = $false

          az containerapp show `
            -n $(backendAppName) `
            -g $(resourceGroupName) `
            --only-show-errors `
            -o json 2>$null | Out-Null

          if ($LASTEXITCODE -eq 0) {
            $exists = $true
          }

          Write-Host "Backend exists: $exists"

          if ($exists) {
            Write-Host "Updating backend..."
            az containerapp update `
              -n $(backendAppName) `
              -g $(resourceGroupName) `
              --image $IMAGE
          }
          else {
            Write-Host "Creating backend..."
            az containerapp create `
              -n $(backendAppName) `
              -g $(resourceGroupName) `
              --environment $(containerAppsEnvironment) `
              --image $IMAGE `
              --target-port 8000 `
              --ingress external `
              --min-replicas 1 `
              --max-replicas 1 `
              --registry-server $(acrName).azurecr.io `
              --registry-identity system
          }

          $BE_FQDN = az containerapp show `
            -n $(backendAppName) `
            -g $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv

          Write-Host "Backend FQDN: https://$BE_FQDN"

# =========================
# DEPLOY FRONTEND
# =========================
- stage: DeployFrontend
  dependsOn: DeployBackend
  jobs:
  - job: DeployFrontendJob
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |

          az extension add --name containerapp --upgrade --yes
          az config set extension.use_dynamic_install=yes_without_prompt

          $IMAGE = "$(acrName).azurecr.io/$(frontendImageName):$(imageTag)"

          $BE_FQDN = az containerapp show `
            -n $(backendAppName) `
            -g $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv

          $BACKEND_URL = "https://$BE_FQDN"

          Write-Host "Backend URL: $BACKEND_URL"

          Write-Host "Checking frontend existence..."
          $exists = $false

          az containerapp show `
            -n $(frontendAppName) `
            -g $(resourceGroupName) `
            --only-show-errors `
            -o json 2>$null | Out-Null

          if ($LASTEXITCODE -eq 0) {
            $exists = $true
          }

          Write-Host "Frontend exists: $exists"

          if ($exists) {
            Write-Host "Updating frontend..."
            az containerapp update `
              -n $(frontendAppName) `
              -g $(resourceGroupName) `
              --image $IMAGE `
              --set-env-vars BACKEND_URL=$BACKEND_URL
          }
          else {
            Write-Host "Creating frontend..."
            az containerapp create `
              -n $(frontendAppName) `
              -g $(resourceGroupName) `
              --environment $(containerAppsEnvironment) `
              --image $IMAGE `
              --target-port 8000 `
              --ingress external `
              --min-replicas 1 `
              --max-replicas 1 `
              --registry-server $(acrName).azurecr.io `
              --registry-identity system `
              --env-vars BACKEND_URL=$BACKEND_URL
          }

# =========================
# VERIFY (ROBUST)
# =========================
- stage: VerifyDeployment
  dependsOn: DeployFrontend
  jobs:
  - job: VerifyJob
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |

          az extension add --name containerapp --upgrade --yes

          $FE_FQDN = az containerapp show `
            -n $(frontendAppName) `
            -g $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv

          $BE_FQDN = az containerapp show `
            -n $(backendAppName) `
            -g $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv

          $BE_URL = "https://$BE_FQDN"
          $FE_URL = "https://$FE_FQDN"

          Write-Host "Backend: $BE_URL"
          Write-Host "Frontend: $FE_URL"

          function Test-Url($url) {
              for ($i=0; $i -lt 12; $i++) {
                  try {
                      Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 15
                      Write-Host "OK: $url"
                      return
                  } catch {
                      Write-Host "Waiting ($i): $url"
                      Start-Sleep -Seconds 10
                  }
              }
              throw "Service not reachable: $url"
          }

          Test-Url "$BE_URL/health"
          Test-Url "$FE_URL/health"
          Test-Url "$FE_URL/demo"

          Write-Host "Revisions backend:"
          az containerapp revision list -n $(backendAppName) -g $(resourceGroupName) -o table

          Write-Host "Revisions frontend:"
          az containerapp revision list -n $(frontendAppName) -g $(resourceGroupName) -o table