trigger:
  - main

pr: none

pool:
  name: self-hosted-pool

variables:
  azureServiceConnection: 'sc-obs-azure-rg'
  resourceGroupName: 'rg-observability-lab12-standalone'
  location: 'westeurope'
  acrName: 'obsacrc830a3'
  containerAppsEnvironment: 'aca-env-francesco'
  backendAppName: 'be-obs-app'
  frontendAppName: 'fe-obs-app'
  backendImageName: 'backend'
  frontendImageName: 'frontend'
  imageTag: '$(Build.BuildId)'

stages:

# =========================
# VALIDATION STAGE
# =========================
- stage: ValidateRepository
  displayName: Validate monorepo structure
  jobs:
  - job: ValidateFiles
    displayName: Check required files and Python syntax
    steps:
    - checkout: self

    - bash: |
        set -e
        test -f frontend/app.py
        test -f frontend/requirements.txt
        test -f frontend/Dockerfile
        test -f backend/app.py
        test -f backend/requirements.txt
        test -f backend/Dockerfile

        python3 -m py_compile frontend/app.py
        python3 -m py_compile backend/app.py
      displayName: Validate files and Python syntax


# =========================
# BUILD & PUSH STAGE
# =========================
- stage: PublishImages
  displayName: Build and push FE/BE images
  dependsOn: ValidateRepository
  condition: succeeded()
  jobs:

  # BACKEND
  - job: BuildBackend
    displayName: Build and push backend image
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Build and push backend image to ACR
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az account show
          az acr login --name $(acrName)

          $BACKEND_IMAGE = "$(acrName).azurecr.io/$(backendImageName):$(imageTag)"

          Write-Host "Building backend image with buildx..."

          docker buildx build `
            --platform linux/amd64 `
            --provenance=false `
            -t $BACKEND_IMAGE `
            --push `
            ./backend


  # FRONTEND
  - job: BuildFrontend
    displayName: Build and push frontend image
    dependsOn: BuildBackend
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Build and push frontend image to ACR
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az account show
          az acr login --name $(acrName)

          $FRONTEND_IMAGE = "$(acrName).azurecr.io/$(frontendImageName):$(imageTag)"

          Write-Host "Building frontend image with buildx..."

          docker buildx build `
            --platform linux/amd64 `
            --provenance=false `
            -t $FRONTEND_IMAGE `
            --push `
            ./frontend


# =========================
# DEPLOY BACKEND
# =========================
- stage: DeployBackend
  displayName: Deploy backend to ACA
  dependsOn: PublishImages
  condition: succeeded()
  jobs:
  - job: DeployBackendJob
    displayName: Deploy or update backend container app
    steps:
    - task: AzureCLI@2
      displayName: Deploy backend app
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add --name containerapp --upgrade

          $BACKEND_IMAGE = "$(acrName).azurecr.io/$(backendImageName):$(imageTag)"

          Write-Host "Checking if backend app exists..."

          $exists = $false
          try {
            az containerapp show --name $(backendAppName) --resource-group $(resourceGroupName) | Out-Null
            $exists = $true
          } catch {}

          if ($exists) {
            Write-Host "Backend exists → updating image"
            az containerapp update `
              --name $(backendAppName) `
              --resource-group $(resourceGroupName) `
              --image $BACKEND_IMAGE
          }
          else {
            Write-Host "Backend does not exist → creating"
            az containerapp create `
              --name $(backendAppName) `
              --resource-group $(resourceGroupName) `
              --environment $(containerAppsEnvironment) `
              --image $BACKEND_IMAGE `
              --target-port 5000 `
              --ingress external `
              --min-replicas 1 `
              --max-replicas 1 `
              --registry-server $(acrName).azurecr.io `
              --registry-identity system
          }

          az containerapp show `
            --name $(backendAppName) `
            --resource-group $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv


# =========================
# DEPLOY FRONTEND
# =========================
- stage: DeployFrontend
  displayName: Deploy frontend to ACA
  dependsOn: DeployBackend
  condition: succeeded()
  jobs:
  - job: DeployFrontendJob
    displayName: Deploy or update frontend container app
    steps:
    - task: AzureCLI@2
      displayName: Deploy frontend app
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add --name containerapp --upgrade

          $FRONTEND_IMAGE = "$(acrName).azurecr.io/$(frontendImageName):$(imageTag)"

          $BE_FQDN = az containerapp show `
            --name $(backendAppName) `
            --resource-group $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv

          $BACKEND_URL = "https://$BE_FQDN"

          $exists = $false
          try {
            az containerapp show --name $(frontendAppName) --resource-group $(resourceGroupName) | Out-Null
            $exists = $true
          } catch {}

          if ($exists) {
            Write-Host "Frontend exists → updating"
            az containerapp update `
              --name $(frontendAppName) `
              --resource-group $(resourceGroupName) `
              --image $FRONTEND_IMAGE `
              --set-env-vars BACKEND_URL=$BACKEND_URL
          }
          else {
            Write-Host "Frontend does not exist → creating"
            az containerapp create `
              --name $(frontendAppName) `
              --resource-group $(resourceGroupName) `
              --environment $(containerAppsEnvironment) `
              --image $FRONTEND_IMAGE `
              --target-port 8080 `
              --ingress external `
              --min-replicas 1 `
              --max-replicas 1 `
              --registry-server $(acrName).azurecr.io `
              --registry-identity system `
              --env-vars BACKEND_URL=$BACKEND_URL
          }

          az containerapp show `
            --name $(frontendAppName) `
            --resource-group $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv


# =========================
# VERIFY DEPLOYMENT
# =========================
- stage: VerifyDeployment
  displayName: Verify FE and BE deployment
  dependsOn: DeployFrontend
  condition: succeeded()
  jobs:
  - job: VerifyJob
    displayName: Run endpoint checks and show revisions
    steps:
    - task: AzureCLI@2
      displayName: Verify deployed apps
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add --name containerapp --upgrade

          $FE_FQDN = az containerapp show `
            --name $(frontendAppName) `
            --resource-group $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv

          $BE_FQDN = az containerapp show `
            --name $(backendAppName) `
            --resource-group $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv

          Write-Host "Waiting 20 seconds for warm-up"
          Start-Sleep -Seconds 20

          Write-Host "Test backend /health"
          curl.exe --fail --silent --show-error "https://$BE_FQDN/health"

          Write-Host "Test frontend /health"
          curl.exe --fail --silent --show-error "https://$FE_FQDN/health"

          Write-Host "Test frontend /demo"
          curl.exe --fail --silent --show-error "https://$FE_FQDN/demo"

          Write-Host "Revision list backend"
          az containerapp revision list `
            --name $(backendAppName) `
            --resource-group $(resourceGroupName) `
            -o table

          Write-Host "Revision list frontend"
          az containerapp revision list `
            --name $(frontendAppName) `
            --resource-group $(resourceGroupName) `
            -o table
