trigger:
  - main

pr: none

pool:
  name: self-hosted-pool

variables:
  azureServiceConnection: 'sc-obs-azure-rg'
  resourceGroupName: 'rg-observability-lab12-standalone'
  location: 'westeurope'
  acrName: 'obsacrc830a3'
  containerAppsEnvironment: 'aca-env-francesco'
  backendAppName: 'be-obs-app'
  frontendAppName: 'fe-obs-app'
  backendImageName: 'backend'
  frontendImageName: 'frontend'
  imageTag: '$(Build.BuildId)'

stages:

# =========================
# VALIDATION
# =========================
- stage: ValidateRepository
  jobs:
  - job: ValidateFiles
    steps:
    - checkout: self
    - bash: |
        set -e
        test -f frontend/app.py
        test -f backend/app.py
        python3 -m py_compile frontend/app.py
        python3 -m py_compile backend/app.py
      displayName: Validate repo


# =========================
# BUILD IMAGES
# =========================
- stage: PublishImages
  dependsOn: ValidateRepository
  condition: succeeded()
  jobs:

  - job: BuildBackend
    steps:
    - checkout: self
    - task: AzureCLI@2
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(acrName)

          $BACKEND_IMAGE = "$(acrName).azurecr.io/$(backendImageName):$(imageTag)"

          docker buildx build `
            --platform linux/amd64 `
            --provenance=false `
            -t $BACKEND_IMAGE `
            --push `
            ./backend

  - job: BuildFrontend
    dependsOn: BuildBackend
    steps:
    - checkout: self
    - task: AzureCLI@2
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(acrName)

          $FRONTEND_IMAGE = "$(acrName).azurecr.io/$(frontendImageName):$(imageTag)"

          docker buildx build `
            --platform linux/amd64 `
            --provenance=false `
            -t $FRONTEND_IMAGE `
            --push `
            ./frontend


# =========================
# DEPLOY BACKEND
# =========================
- stage: DeployBackend
  dependsOn: PublishImages
  jobs:
  - job: DeployBackendJob
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |

          az extension add --name containerapp --upgrade --yes

          $BACKEND_IMAGE = "$(acrName).azurecr.io/$(backendImageName):$(imageTag)"

          Write-Host "Checking backend existence..."

          $backend = $null
          try {
              $backend = az containerapp show `
                --name $(backendAppName) `
                --resource-group $(resourceGroupName) `
                --only-show-errors `
                -o json | ConvertFrom-Json
          } catch {
              $backend = $null
          }

          if ($backend -and $backend.name) {
            Write-Host "Backend exists → update"

            az containerapp update `
              --name $(backendAppName) `
              --resource-group $(resourceGroupName) `
              --image $BACKEND_IMAGE
          }
          else {
            Write-Host "Backend does NOT exist → create"

            az containerapp create `
              --name $(backendAppName) `
              --resource-group $(resourceGroupName) `
              --environment $(containerAppsEnvironment) `
              --image $BACKEND_IMAGE `
              --target-port 8000 `
              --ingress external `
              --min-replicas 1 `
              --max-replicas 1 `
              --registry-server $(acrName).azurecr.io `
              --registry-identity system
          }

          az containerapp show `
            --name $(backendAppName) `
            --resource-group $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv


# =========================
# DEPLOY FRONTEND
# =========================
- stage: DeployFrontend
  dependsOn: DeployBackend
  jobs:
  - job: DeployFrontendJob
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |

          az extension add --name containerapp --upgrade --yes

          $FRONTEND_IMAGE = "$(acrName).azurecr.io/$(frontendImageName):$(imageTag)"

          $BE_FQDN = az containerapp show `
            --name $(backendAppName) `
            --resource-group $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv

          $BACKEND_URL = "https://$BE_FQDN"

          Write-Host "Checking frontend existence..."

          $frontend = $null
          try {
              $frontend = az containerapp show `
                --name $(frontendAppName) `
                --resource-group $(resourceGroupName) `
                --only-show-errors `
                -o json | ConvertFrom-Json
          } catch {
              $frontend = $null
          }

          if ($frontend -and $frontend.name) {
            Write-Host "Frontend exists → update"

            az containerapp update `
              --name $(frontendAppName) `
              --resource-group $(resourceGroupName) `
              --image $FRONTEND_IMAGE `
              --set-env-vars BACKEND_URL=$BACKEND_URL
          }
          else {
            Write-Host "Frontend does NOT exist → create"

            az containerapp create `
              --name $(frontendAppName) `
              --resource-group $(resourceGroupName) `
              --environment $(containerAppsEnvironment) `
              --image $FRONTEND_IMAGE `
              --target-port 8080 `
              --ingress external `
              --min-replicas 1 `
              --max-replicas 1 `
              --registry-server $(acrName).azurecr.io `
              --registry-identity system `
              --env-vars BACKEND_URL=$BACKEND_URL
          }

          az containerapp show `
            --name $(frontendAppName) `
            --resource-group $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv


# =========================
# VERIFY
# =========================
- stage: VerifyDeployment
  dependsOn: DeployFrontend
  jobs:
  - job: VerifyJob
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |

          az extension add --name containerapp --upgrade --yes

          $FE_FQDN = az containerapp show `
            --name $(frontendAppName) `
            --resource-group $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv

          $BE_FQDN = az containerapp show `
            --name $(backendAppName) `
            --resource-group $(resourceGroupName) `
            --query properties.configuration.ingress.fqdn `
            -o tsv

          Start-Sleep -Seconds 40

          Write-Host "Backend health"
          Invoke-WebRequest "https://$BE_FQDN/health" -UseBasicParsing

          Write-Host "Frontend health"
          Invoke-WebRequest "https://$FE_FQDN/health" -UseBasicParsing

          Write-Host "Frontend demo"
          Invoke-WebRequest "https://$FE_FQDN/demo" -UseBasicParsing

          az containerapp revision list `
            --name $(backendAppName) `
            --resource-group $(resourceGroupName) `
            -o table

          az containerapp revision list `
            --name $(frontendAppName) `
            --resource-group $(resourceGroupName) `
            -o table