trigger:
  - main

pr: none

pool:
  name: self-hosted-pool

variables:
  azureServiceConnection: 'sc-obs-azure-rg'
  acrName: 'obsacrc830a3'
  imageTag: '$(Build.BuildId)'

stages:

# =========================
# VALIDATION STAGE
# =========================
- stage: ValidateRepository
  displayName: Validate monorepo structure
  jobs:
  - job: ValidateFiles
    displayName: Check required files and Python syntax
    steps:
    - checkout: self

    - bash: |
        set -e

        echo "Verifica struttura repository"

        for f in \
          frontend/app.py \
          frontend/requirements.txt \
          frontend/Dockerfile \
          backend/app.py \
          backend/requirements.txt \
          backend/Dockerfile
        do
          if [ ! -f "$f" ]; then
            echo "File mancante: $f"
            exit 1
          fi
        done

        echo "Verifica sintassi Python"
        python3 -m py_compile frontend/app.py
        python3 -m py_compile backend/app.py

        echo "OK: validazione completata"
      displayName: Validate files and Python syntax


# =========================
# BUILD & PUSH STAGE
# =========================
- stage: PublishImages
  displayName: Build and push FE/BE images
  dependsOn: ValidateRepository
  condition: succeeded()
  jobs:

  # -------------------------
  # BACKEND
  # -------------------------
  - job: BuildBackend
    displayName: Build and push backend image
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Build and push backend image to ACR
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e

          echo "Login Azure..."
          az account show

          echo "Login ACR..."
          az acr login --name $(acrName)

          BACKEND_IMAGE="$(acrName).azurecr.io/backend:$(imageTag)"

          echo "Building backend image: $BACKEND_IMAGE"
          docker build -t $BACKEND_IMAGE ./backend

          echo "Pushing backend image..."
          docker push $BACKEND_IMAGE

          echo "Tags backend repository:"
          az acr repository show-tags \
            --name $(acrName) \
            --repository backend \
            -o table


  # -------------------------
  # FRONTEND
  # -------------------------
  - job: BuildFrontend
    displayName: Build and push frontend image
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Build and push frontend image to ACR
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e

          echo "Login Azure..."
          az account show

          echo "Login ACR..."
          az acr login --name $(acrName)

          FRONTEND_IMAGE="$(acrName).azurecr.io/frontend:$(imageTag)"

          echo "Building frontend image: $FRONTEND_IMAGE"
          docker build -t $FRONTEND_IMAGE ./frontend

          echo "Pushing frontend image..."
          docker push $FRONTEND_IMAGE

          echo "Tags frontend repository:"
          az acr repository show-tags \
            --name $(acrName) \
            --repository frontend \
            -o table